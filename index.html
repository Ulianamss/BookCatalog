<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog</title>
    <link rel="stylesheet" href="./src/styles/style.css">
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <p>The library</p>
            <button id="themeToggle">Dark Mode</button>
        </header>

        <!-- MAIN CONTENT -->
        <div class="mainContent">
            
            <!-- SEARCH SECTION -->
            <div class="topSection">
                <p class="title">Book Catalog</p>
                <p class="subtitle">Search books</p>
                <div class="inputSection">
                    <input id="searchInput" type="text" placeholder="Search books" >
                    <button id="searchButton">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M9.16667 15.8333C12.8486 15.8333 15.8333 12.8486 15.8333 9.16667C15.8333 5.48477 12.8486 2.5 9.16667 2.5C5.48477 2.5 2.5 5.48477 2.5 9.16667C2.5 12.8486 5.48477 15.8333 9.16667 15.8333Z" stroke="#ddd" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M17.5 17.5L13.9166 13.9167" stroke="#ddd" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>                
                </div>
            </div>
            
            <!-- RESULTS SECTION -->
            <div class="resultsSection">
                <!-- Author Filter -->
                <div id="filterContainer">
                    <label for="authorFilter">Filter by author:</label>
                    <select id="authorFilter">
                        <option value="">All Authors</option>
                    </select>
                </div>

                <!-- Loading Indicator -->
                <div id="loading" class="hidden">Loading...</div>

                <!-- Results Grid -->
                <div id="results"></div>
            </div>

            <!-- FAVORITES SECTION -->
            <div class="favoritesSection">
                <p class="favoritesHeading">Favorites</p>
                <div id="favorites"></div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer>
            <p>Meow :)</p>
        </footer>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"></div>

    <!-- MAIN JS ENTRY POINT - IMPORTANT: type="module" -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
